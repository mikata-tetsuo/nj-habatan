/* ========================================================
   TEXT-TO-SPEECH
======================================================== */
function getEnVoice() {
  const voices = speechSynthesis.getVoices();
  return voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang === 'en-GB')
    || voices.find(v => v.lang.startsWith('en'));
}

function speakText(text, btn) {
  if (!('speechSynthesis' in window)) return;
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    const wasSame = _currentSpeakBtn === btn;
    setSpeakBtnState(_currentSpeakBtn, false);
    _currentSpeakBtn = null;
    if (wasSame) return;
  }
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  const voice = getEnVoice();
  if (voice) utter.voice = voice;
  utter.onend   = () => { setSpeakBtnState(btn, false); _currentSpeakBtn = null; };
  utter.onerror = () => { setSpeakBtnState(btn, false); _currentSpeakBtn = null; };
  _currentSpeakBtn = btn;
  setSpeakBtnState(btn, true);
  speechSynthesis.speak(utter);
}

function stopSpeech() {
  if (typeof speechSynthesis !== 'undefined' && speechSynthesis.speaking) {
    speechSynthesis.cancel();
  }
  setSpeakBtnState(_currentSpeakBtn, false);
  _currentSpeakBtn = null;
}

function setSpeakBtnState(btn, active) {
  if (!btn) return;
  btn.classList.toggle('speaking', active);
  if (btn.id === 'btnSpeakPassage') {
    btn.innerHTML = active ? '⏹ 停止' : '🔊 読み上げ';
  } else {
    btn.innerHTML = active ? '⏹' : '🔊';
  }
}

if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => {};
}

function speakAsync(text) {
  return new Promise(resolve => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang  = 'en-US';
    utter.rate  = 0.85;
    const voice = getEnVoice();
    if (voice) utter.voice = voice;
    utter.onend   = () => resolve();
    utter.onerror = () => resolve();
    speechSynthesis.speak(utter);
  });
}

let _listenPlayId = 0;

async function startListenPlayback() {
  const q = GRADE_PASSAGES[currentGrade]?.[currentStageIdx];
  if (!q) return;

  const myId = ++_listenPlayId;
  const statusEl = $('listenStatus');
  const playBtn  = $('btnListenPlay');

  playBtn.disabled    = true;
  playBtn.textContent = '⏸ 再生中...';

  const setStatus = (text) => {

    statusEl.textContent = text;
    statusEl.className   = 'listen-audio-status';
  };

  setStatus('📖 本文を読んでいます...');
  await speakAsync(q.passage);
  if (_listenPlayId !== myId) return;

  setStatus('❓ 問題文を読んでいます...');
  await speakAsync(q.question);
  if (_listenPlayId !== myId) return;

  if (listenShowChoices) {
    setStatus('🔤 選択肢を読んでいます...');
    const choiceText = `A. ${q.choice_a}. B. ${q.choice_b}. C. ${q.choice_c}. D. ${q.choice_d}.`;
    await speakAsync(choiceText);
    if (_listenPlayId !== myId) return;
  }

  statusEl.textContent = '✅ 再生完了 — 答えを選んでください';
  statusEl.className   = 'listen-audio-status';
  if (listenShowChoices) $('choicesDiv').classList.remove('choices-hidden');

function getPeriodKey(type) {
  const d = new Date();
  const jst = new Date(d.getTime() + (d.getTimezoneOffset() + 9*60)*60*1000);
  const y   = jst.getFullYear();
  const m   = String(jst.getMonth()+1).padStart(2,'0');
  const dy  = String(jst.getDate()).padStart(2,'0');
  const dow = jst.getDay() || 7;
  const monday = new Date(jst); monday.setDate(jst.getDate() - dow + 1);
  const jan4 = new Date(monday.getFullYear(), 0, 4);
  const startW1 = new Date(jan4); startW1.setDate(jan4.getDate() - (jan4.getDay()||7) + 1);
  const weekNum = Math.floor((monday - startW1) / (7*86400000)) + 1;
  if (type === 'daily')   return `${y}-${m}-${dy}`;
  if (type === 'weekly')  return `${y}-W${String(weekNum).padStart(2,'0')}`;
  if (type === 'monthly') return `${y}-${m}`;
  return `${y}`;
}

function calcPeriodUpdates(ex, newScore) {
  const periods = [
    {type:'daily',   sf:'d_score', kf:'d_key'},
    {type:'weekly',  sf:'w_score', kf:'w_key'},
    {type:'monthly', sf:'m_score', kf:'m_key'},
    {type:'yearly',  sf:'y_score', kf:'y_key'},
  ];
  const updates = {};
  for (const {type, sf, kf} of periods) {
    const key = getPeriodKey(type);
    updates[kf] = key;
    updates[sf] = ex[kf] === key ? Math.max(ex[sf] || 0, newScore) : newScore;
  }
  return updates;
}

async function submitToSokutoreRanking() {
  if (!fbUser) return;
  const totalPts = (fbBonusPts || 0) + (fbQuizPts || 0);
  if (totalPts <= 0) return;
  const name = fbNickname || fbUser.displayName || '名無し';
  try {
    const ref = fbDb.collection('sokutore_rankings').doc(fbUser.uid);
    const doc = await ref.get();
    const ex  = doc.data() || {};
    await ref.set({
      displayName: name,
      photoURL:    fbUser.photoURL || '',
      score:       totalPts,
      updatedAt:   firebase.firestore.FieldValue.serverTimestamp(),
      ...calcPeriodUpdates(ex, totalPts)
    }, { merge: true });
  } catch(e) { console.error('Ranking:', e); }
}

async function renderRankingScreen() {
  const listEl = $('rankingList');
  const hintEl = $('rankingLoginHint');
  listEl.innerHTML = '<div class="ranking-loading">読み込み中... ⏳</div>';
  if (hintEl) hintEl.style.display = fbUser ? 'none' : 'block';

  const periodMap = {
    daily:   {kf:'d_key', sf:'d_score'},
    weekly:  {kf:'w_key', sf:'w_score'},
    monthly: {kf:'m_key', sf:'m_score'},
    yearly:  {kf:'y_key', sf:'y_score'},
  };
  const pInfo  = periodMap[rankingPeriod];
  const curKey = getPeriodKey(rankingPeriod);

  try {
    const snap = await fbDb.collection('sokutore_rankings').orderBy('score','desc').limit(200).get();
    let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (rankingPeriod === 'yearly') {
      items.sort((a,b) => (b.score||0) - (a.score||0));
    } else {
      items = items
        .filter(d => d[pInfo.kf] === curKey && (d[pInfo.sf]||0) > 0)
        .sort((a,b) => (b[pInfo.sf]||0) - (a[pInfo.sf]||0));
    }
    items = items.slice(0, 30);

    if (!items.length) {
      listEl.innerHTML = '<div class="ranking-empty">まだ記録がありません 🤔<br>プレイしてランキングに載ろう！</div>';
      return;
    }
    listEl.innerHTML = items.map((d, i) => {
      const isMe    = fbUser && d.id === fbUser.uid;
      const medal   = ['🥇','🥈','🥉'][i] || (i+1)+'';
      const nc      = ['top1','top2','top3'][i] || '';
      const avatar  = d.photoURL
        ? `<img class="rank-avatar" src="${d.photoURL}" alt="">`
        : '<span class="rank-avatar"></span>';
      const scoreVal = rankingPeriod === 'yearly' ? (d.score||0) : (d[pInfo.sf]||0);
      return `<div class="rank-row${isMe?' rank-me':''}">` +
        `<span class="rank-num ${nc}">${medal}</span>${avatar}` +
        `<span class="rank-name">${d.displayName||'名無し'}${isMe?' 👈':''}</span>` +
        `<span class="rank-score">${scoreVal.toLocaleString()}pt</span></div>`;
    }).join('');
  } catch(e) {
    listEl.innerHTML = '<div class="ranking-empty">読み込みに失敗しました 😢</div>';
    console.error('Ranking:', e);
  }
}

$('btnOpenRanking').addEventListener('click', () => {
  if (!fbUser) {
    const btn = $('btnOpenRanking');
    btn.style.animation = 'none';
    void btn.offsetWidth;
    btn.style.animation = 'rankShake 0.4s ease';
    return;
  }
  showScreen('rankingScreen');
  renderRankingScreen();
});
$('btnRankingBack').addEventListener('click', () => showScreen('gradeMapScreen'));
document.querySelectorAll('#rankPeriodTabs .rank-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('#rankPeriodTabs .rank-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    rankingPeriod = tab.dataset.period;
    renderRankingScreen();
  });
});

});

$('btnSpeakQuestion').addEventListener('click', () => {
  const q = GRADE_PASSAGES[currentGrade]?.[currentStageIdx];
  if (q) speakText(q.question, $('btnSpeakQuestion'));
});
