const PASSAGES = [{"id":0,"type":"reading","eiken_grade":"5","sub_level":1,"passage":"I have a cat. Her name is Shiro. She is white. She likes fish.","japanese_translation":"私は猫を飼っています。名前はシロ。白い猫です。魚が好きです。","question":"What does Shiro like?","choice_a":"Milk","choice_b":"Meat","choice_c":"Fish","choice_d":"Rice","answer":"C","target_time_sec":25,"reading_point":"She likes fish. が答えの根拠","evidence_text":"She likes fish","reward_point":10},{"id":1,"type":"reading","eiken_grade":"5","sub_level":2,"passage":"Today is Sunday. Ken goes to the park with his brother. They play soccer and have fun.","japanese_translation":"今日は日曜日。ケンはお兄さんと公園へ行きます。サッカーをして楽しんでいます。","question":"Who does Ken go to the park with?","choice_a":"His friend","choice_b":"His sister","choice_c":"His father","choice_d":"His brother","answer":"D","target_time_sec":30,"reading_point":"with his brother が一緒にいる人の根拠","evidence_text":"his brother","reward_point":10},{"id":2,"type":"reading","eiken_grade":"5","sub_level":3,"passage":"Lisa goes to school every day. She studies math, science, and English. English is her favorite subject because she likes learning new words.","japanese_translation":"リサは毎日学校へ行きます。数学・理科・英語を勉強します。新しい単語を覚えるのが好きなので英語が一番好きです。","question":"Why is English Lisa's favorite subject?","choice_a":"The teacher is nice","choice_b":"It is easy","choice_c":"She likes learning new words","choice_d":"Her friends study it","answer":"C","target_time_sec":35,"reading_point":"because she likes learning new words が理由の根拠","evidence_text":"she likes learning new words","reward_point":10},{"id":3,"type":"reading","eiken_grade":"4","sub_level":1,"passage":"Last summer, Yuki visited Kyoto with her family. She saw many beautiful temples and traditional gardens. It was her first time there, and she wants to go again.","japanese_translation":"去年の夏、ユキは家族と京都を訪れました。美しいお寺と日本庭園をたくさん見ました。初めての訪問で、またいつか行きたいと思っています。","question":"What did Yuki see in Kyoto?","choice_a":"Modern buildings","choice_b":"Temples and gardens","choice_c":"Famous restaurants","choice_d":"Shopping malls","answer":"B","target_time_sec":40,"reading_point":"temples and traditional gardens を本文から探す","evidence_text":"temples and traditional gardens","reward_point":10},{"id":4,"type":"reading","eiken_grade":"4","sub_level":2,"passage":"Tom started learning Japanese six months ago. He practices every day by watching Japanese videos and writing new words. He can now have simple conversations.","japanese_translation":"トムは6ヶ月前に日本語の勉強を始めました。毎日動画を見たり単語を書いたりして練習しています。今では簡単な会話ができます。","question":"How long has Tom been learning Japanese?","choice_a":"One year","choice_b":"Three months","choice_c":"Six months","choice_d":"Two years","answer":"C","target_time_sec":45,"reading_point":"six months ago から開始時期を計算","evidence_text":"six months ago","reward_point":10},{"id":5,"type":"reading","eiken_grade":"4","sub_level":3,"passage":"Anna joined the school volleyball club last year. She practices three times a week after school. It was hard at first, but now she enjoys it and has made many new friends.","japanese_translation":"アンナは去年学校のバレーボール部に入りました。放課後、週に3回練習します。最初は大変でしたが、今では楽しんでおり友達もたくさんできました。","question":"How often does Anna practice volleyball?","choice_a":"Every day","choice_b":"Once a week","choice_c":"Twice a week","choice_d":"Three times a week","answer":"D","target_time_sec":50,"reading_point":"three times a week が頻度の根拠","evidence_text":"three times a week","reward_point":10},{"id":6,"type":"reading","eiken_grade":"3","sub_level":1,"passage":"Recycling is important for protecting our environment. When we recycle paper, plastic, and glass, we reduce the amount of waste sent to landfills. Many cities now provide separate bins to make recycling easier for everyone.","japanese_translation":"リサイクルは環境を守るために大切です。紙・プラスチック・ガラスをリサイクルすると埋め立て地へのごみを減らせます。多くの都市では分別ゴミ箱を設けています。","question":"What is the benefit of recycling mentioned in the text?","choice_a":"It saves money","choice_b":"It reduces waste in landfills","choice_c":"It creates new jobs","choice_d":"It saves energy","answer":"B","target_time_sec":55,"reading_point":"reduce the amount of waste sent to landfills が具体的な効果","evidence_text":"reduce the amount of waste sent to landfills","reward_point":10},{"id":7,"type":"reading","eiken_grade":"3","sub_level":2,"passage":"Social media has become a major part of daily life for many young people. While it helps people stay connected with friends and family, spending too much time on it can lead to poor sleep and feelings of anxiety. Experts suggest limiting screen time, especially before bed.","japanese_translation":"SNSは多くの若者の日常生活の大きな部分を占めています。友人との連絡に役立つ一方、使いすぎると睡眠の質の低下や不安感につながります。専門家は特に寝る前の画面時間を制限するよう勧めています。","question":"What do experts suggest?","choice_a":"Stopping social media completely","choice_b":"Limiting screen time before bed","choice_c":"Using social media only for study","choice_d":"Checking phones in the morning","answer":"B","target_time_sec":60,"reading_point":"Experts suggest limiting screen time, especially before bed が専門家のアドバイス","evidence_text":"limiting screen time, especially before bed","reward_point":10},{"id":8,"type":"reading","eiken_grade":"3","sub_level":3,"passage":"Many high school students in Japan have part-time jobs. Working part-time gives students a chance to earn their own money and learn responsibility. Some use the money to pay for hobbies or save for the future. However, it is important to balance work with study.","japanese_translation":"日本では多くの高校生がアルバイトをしています。アルバイトは自分でお金を稼ぎ責任感を学ぶ機会です。趣味や貯金に使う生徒もいます。しかし仕事と勉強のバランスを取ることが大切です。","question":"What is one benefit of part-time jobs for students?","choice_a":"They can skip classes","choice_b":"They learn responsibility","choice_c":"They get better grades","choice_d":"They meet teachers","answer":"B","target_time_sec":65,"reading_point":"learn responsibility が具体的なメリット","evidence_text":"learn responsibility","reward_point":10},{"id":9,"type":"reading","eiken_grade":"pre2","sub_level":1,"passage":"Scientists have shown that sleep is essential for both physical and mental health. During sleep, the brain processes information gathered throughout the day and strengthens memories. Most adults need seven to nine hours of sleep each night, but many people get far less than this.","japanese_translation":"科学者たちは睡眠が身体的・精神的健康に不可欠であることを示しています。睡眠中、脳は一日を通して集めた情報を処理し記憶を強化します。ほとんどの大人は毎晩7〜9時間が必要ですが、それより少ない人も多くいます。","question":"What does the brain do during sleep?","choice_a":"It rests completely","choice_b":"It processes information and strengthens memories","choice_c":"It prepares for the next day","choice_d":"It repairs the body","answer":"B","target_time_sec":70,"reading_point":"the brain processes information ... and strengthens memories がキー","evidence_text":"processes information gathered throughout the day and strengthens memories","reward_point":10},{"id":10,"type":"reading","eiken_grade":"pre2","sub_level":2,"passage":"Volunteering is a meaningful way to give back to the community. Many people spend their free time helping at hospitals, schools, or local events. Research has found that volunteers often report higher levels of happiness and a greater sense of purpose in their lives compared to non-volunteers.","japanese_translation":"ボランティアは地域社会に貢献する意義ある方法です。多くの人が病院・学校・地域イベントでボランティアをしています。研究によると、ボランティアをしている人はしていない人と比べて幸福度が高く目的意識が強いと報告しています。","question":"What does research show about volunteers?","choice_a":"They earn more money","choice_b":"They are healthier physically","choice_c":"They report higher happiness and purpose","choice_d":"They have more free time","answer":"C","target_time_sec":75,"reading_point":"Research has found that volunteers often report ... happiness and ... purpose","evidence_text":"higher levels of happiness and a greater sense of purpose","reward_point":10},{"id":11,"type":"reading","eiken_grade":"pre2","sub_level":3,"passage":"Exercise is widely known for its physical benefits, but its effects on mental health are equally significant. When people exercise, the brain releases chemicals called endorphins, which naturally improve mood and reduce feelings of stress. Regular physical activity has been shown to help reduce symptoms of depression and anxiety.","japanese_translation":"運動は身体への効果でよく知られていますが、精神的健康への効果も同様に重要です。運動をすると脳はエンドルフィンという化学物質を分泌し、気分を改善しストレスを軽減します。定期的な運動はうつや不安の症状を和らげるのに役立つことが示されています。","question":"What are endorphins?","choice_a":"A type of exercise","choice_b":"Chemicals that improve mood during exercise","choice_c":"Vitamins found in food","choice_d":"A symptom of stress","answer":"B","target_time_sec":80,"reading_point":"chemicals called endorphins, which naturally improve mood and reduce feelings of stress","evidence_text":"chemicals called endorphins, which naturally improve mood","reward_point":10},{"id":12,"type":"reading","eiken_grade":"pre2p","sub_level":1,"passage":"Remote work, once considered a temporary solution, has become a permanent feature of many workplaces worldwide. Employees report benefits such as reduced commuting time and greater flexibility in managing their schedules. However, some workers struggle with feelings of isolation and find it difficult to separate their professional and personal lives.","japanese_translation":"在宅勤務はかつて一時的な解決策とされていましたが、世界中の多くの職場で恒久的な働き方になっています。通勤時間の短縮やスケジュール管理の柔軟性向上などの利点が報告されています。一方、孤独感に悩んだり仕事とプライベートの切り分けが難しい人もいます。","question":"What challenge do some remote workers face?","choice_a":"Longer working hours","choice_b":"Higher costs","choice_c":"Feelings of isolation","choice_d":"Less flexibility","answer":"C","target_time_sec":85,"reading_point":"some workers struggle with feelings of isolation に注目","evidence_text":"feelings of isolation","reward_point":10},{"id":13,"type":"reading","eiken_grade":"pre2p","sub_level":2,"passage":"Urban farming—growing food within or around cities—is gaining attention as a sustainable approach to food production. By establishing rooftop gardens and vertical farms, cities can produce fresh vegetables closer to consumers, significantly reducing transportation costs and carbon emissions. Proponents also argue that urban farms can strengthen community relationships and improve food security.","japanese_translation":"都市農業は持続可能な食料生産アプローチとして注目されています。屋上庭園や垂直農場を設置することで、都市は消費者の近くで新鮮な野菜を生産し、輸送コストや炭素排出量を大幅に削減できます。支持者はコミュニティの絆の強化や食料安全保障の改善にもなると主張しています。","question":"What is one environmental benefit of urban farming?","choice_a":"It creates more jobs","choice_b":"It reduces transportation emissions","choice_c":"It improves air quality","choice_d":"It eliminates food waste","answer":"B","target_time_sec":90,"reading_point":"reducing transportation costs and carbon emissions が環境への具体的効果","evidence_text":"reducing transportation costs and carbon emissions","reward_point":10},{"id":14,"type":"reading","eiken_grade":"pre2p","sub_level":3,"passage":"The rapid spread of misinformation on social media has become a serious concern for governments and researchers. False content can travel faster than factual corrections, particularly when it appeals to people's emotions. Media literacy experts stress the importance of verifying information through credible sources before sharing it online.","japanese_translation":"SNS上での誤情報の急速な拡散は政府や研究者にとって深刻な問題となっています。虚偽のコンテンツは、特に感情に訴えるものの場合、事実の訂正よりも速く広まります。メディアリテラシーの専門家は、共有前に信頼できる情報源で確認することの重要性を強調しています。","question":"Why does misinformation spread quickly?","choice_a":"People do not use the internet","choice_b":"It is hard to identify online","choice_c":"It often appeals to people's emotions","choice_d":"Governments do not control it","answer":"C","target_time_sec":95,"reading_point":"particularly when it appeals to people's emotions が拡散理由","evidence_text":"appeals to people's emotions","reward_point":10},{"id":15,"type":"reading","eiken_grade":"2","sub_level":1,"passage":"Artificial intelligence is transforming the field of medicine. AI systems can now analyze thousands of medical images in minutes, helping doctors detect diseases such as cancer at earlier stages. While these tools improve diagnostic accuracy, experts caution that AI should function as a support tool rather than replace the clinical judgment of trained physicians.","japanese_translation":"人工知能は医療分野を変革しています。AIシステムは数千枚の医療画像を数分で分析し、医師がガンなどの病気を早期発見するのを助けます。これらのツールは診断精度を向上させますが、AIは医師の臨床判断を置き換えるのではなく補助ツールとして機能すべきだと専門家は警告しています。","question":"What do experts say about AI in medicine?","choice_a":"It should replace doctors completely","choice_b":"It is not yet accurate enough","choice_c":"It should support, not replace, doctors","choice_d":"It is too expensive to use","answer":"C","target_time_sec":100,"reading_point":"AI should function as a support tool rather than replace ... physicians","evidence_text":"support tool rather than replace the clinical judgment of trained physicians","reward_point":10},{"id":16,"type":"reading","eiken_grade":"2","sub_level":2,"passage":"Climate change is increasingly affecting food production around the world. Rising temperatures, unpredictable rainfall, and extreme weather events are making it harder for farmers to maintain stable harvests. In response, many governments are investing in research to develop drought-resistant crops and more efficient irrigation systems to protect food security.","japanese_translation":"気候変動は世界中の食料生産にますます影響を与えています。気温の上昇・不規則な降雨・極端な気象により農家が安定した収穫を維持することが難しくなっています。多くの政府は干ばつに強い作物や効率的な灌漑システムの研究に投資しています。","question":"How are governments responding to climate change's effect on farming?","choice_a":"By reducing farm sizes","choice_b":"By importing more food","choice_c":"By investing in research for resilient crops","choice_d":"By increasing food prices","answer":"C","target_time_sec":110,"reading_point":"investing in research to develop drought-resistant crops が政府の対策","evidence_text":"investing in research to develop drought-resistant crops and more efficient irrigation systems","reward_point":10},{"id":17,"type":"reading","eiken_grade":"2","sub_level":3,"passage":"Space exploration, once driven purely by national competition, has increasingly yielded practical benefits for everyday life on Earth. Technologies developed for space missions—including GPS navigation, memory foam, and water purification systems—have since found widespread civilian applications. This transfer of innovation from space programs to consumer products highlights the broader societal value of continued investment in space research.","japanese_translation":"かつて国家間の競争で推進されていた宇宙探査は、地球上の日常生活に実用的な恩恵をもたらすようになっています。GPS・低反発フォーム・水浄化システムなど宇宙ミッションのために開発された技術はその後広く一般に応用されています。この技術革新の移転は宇宙研究への継続的投資の社会的価値を示しています。","question":"What is the main point of this passage?","choice_a":"Space exploration is too expensive","choice_b":"Space research benefits everyday life on Earth","choice_c":"GPS was invented by NASA","choice_d":"National competition drives innovation","answer":"B","target_time_sec":120,"reading_point":"practical benefits for everyday life on Earth が主旨。技術移転の例が根拠","evidence_text":"practical benefits for everyday life on Earth","reward_point":10},{"id":18,"type":"reading","eiken_grade":"pre1","sub_level":1,"passage":"Confirmation bias refers to the tendency of individuals to seek out, interpret, and recall information in ways that confirm their pre-existing beliefs, while ignoring contradictory evidence. This cognitive bias can significantly distort decision-making and is considered one of the most prevalent forms of faulty reasoning. Awareness of this bias is the first step toward more objective thinking.","japanese_translation":"確証バイアスとは、既存の信念を確認する方法で情報を探し・解釈し・記憶する一方で、矛盾する証拠を無視する傾向です。この認知バイアスは意思決定を大きく歪め、誤った推論の最も一般的な形の一つとされています。このバイアスへの認識が、より客観的な思考への第一歩と考えられています。","question":"What is confirmation bias?","choice_a":"The tendency to share information widely","choice_b":"A preference for complex information","choice_c":"Seeking information that confirms existing beliefs","choice_d":"The ability to change one's opinion easily","answer":"C","target_time_sec":130,"reading_point":"the tendency ... to seek out ... information in ways that confirm their pre-existing beliefs","evidence_text":"seek out, interpret, and recall information in ways that confirm their pre-existing beliefs","reward_point":10},{"id":19,"type":"reading","eiken_grade":"pre1","sub_level":2,"passage":"Microplastics—particles of plastic smaller than five millimeters—have been detected in virtually every environment on Earth, including oceans, rivers, soil, and the human bloodstream. They originate primarily from the gradual breakdown of larger plastic items through exposure to sunlight and mechanical forces. Scientists are increasingly concerned about their potential to disrupt hormonal systems and accumulate in body tissues.","japanese_translation":"5ミリ未満のプラスチック粒子であるマイクロプラスチックは、海・川・土壌・人間の血液など地球上のほぼあらゆる環境で検出されています。主に太陽光や機械的な力による大きなプラスチック製品の分解から生じます。科学者たちはホルモン系を乱し体組織に蓄積する可能性への懸念を強めています。","question":"Where do microplastics primarily come from?","choice_a":"Industrial chemical waste","choice_b":"Breakdown of larger plastic items","choice_c":"Ocean pollution from ships","choice_d":"Atmospheric particles","answer":"B","target_time_sec":140,"reading_point":"originate primarily from the gradual breakdown of larger plastic items が由来","evidence_text":"gradual breakdown of larger plastic items","reward_point":10},{"id":20,"type":"reading","eiken_grade":"pre1","sub_level":3,"passage":"Universal Basic Income (UBI) is a policy proposal in which every citizen receives a regular, unconditional cash payment from the government, regardless of employment status. Proponents argue that UBI could eliminate poverty, reduce bureaucratic inefficiency in existing welfare systems, and provide individuals with greater freedom to pursue education or entrepreneurship. Critics, however, question whether the substantial cost could be sustained without raising taxes significantly or reducing other public services.","japanese_translation":"ユニバーサル・ベーシック・インカム（UBI）は、雇用状況に関わらず全市民が政府から定期的・無条件で現金を受け取る政策提案です。支持者はUBIが貧困をなくし福祉制度の非効率を削減し個人の自由を広げると主張します。批判者は、税率の大幅引き上げや他サービスの削減なしにコストを維持できるか疑問を呈しています。","question":"What is the main concern raised by critics of UBI?","choice_a":"It would reduce individual freedom","choice_b":"It cannot be funded without major trade-offs","choice_c":"It would increase unemployment","choice_d":"It would harm small businesses","answer":"B","target_time_sec":150,"reading_point":"critics question whether the substantial cost could be sustained without raising taxes or reducing other services","evidence_text":"substantial cost could be sustained without raising taxes significantly or reducing other public services","reward_point":10},{"id":21,"type":"reading","eiken_grade":"5","sub_level":4,"passage":"Japan went to a big meeting. Many countries want a world without nuclear weapons. Japan and 115 other countries signed a letter together.","japanese_translation":"日本は大きな会議に出席しました。多くの国が核兵器のない世界を望んでいます。日本と115の国々が一緒に手紙に署名しました。","question":"How many countries signed the letter with Japan?","choice_a":"15","choice_b":"50","choice_c":"100","choice_d":"115","answer":"D","target_time_sec":30,"reading_point":"115 other countries が国の数の根拠","evidence_text":"115 other countries","reward_point":10},{"id":22,"type":"reading","eiken_grade":"4","sub_level":4,"passage":"The Japanese yen fell to a very low level against the US dollar. The Japanese government decided to buy yen to make it stronger. After this action, the yen rose by more than two percent in one day.","japanese_translation":"日本円は米ドルに対してとても低い水準まで下落しました。日本政府は円を強くするために円買いを決定しました。この介入後、円は1日で2パーセント以上上昇しました。","question":"What did the Japanese government do to strengthen the yen?","choice_a":"Raised interest rates","choice_b":"Bought yen","choice_c":"Sold dollars","choice_d":"Lowered taxes","answer":"B","target_time_sec":45,"reading_point":"decided to buy yen が政府の行動の根拠","evidence_text":"decided to buy yen to make it stronger","reward_point":10},
{"id":23,"type":"reading","eiken_grade":"5","sub_level":5,"passage":"My name is Taro. I am twelve years old. My favorite sport is swimming. I swim every Saturday at the pool near my house.","japanese_translation":"私の名前は太郎です。12歳です。好きなスポーツは水泳です。毎週土曜日、家の近くのプールで泳ぎます。","question":"When does Taro go swimming?","choice_a":"Every Sunday","choice_b":"Every Monday","choice_c":"Every Saturday","choice_d":"Every Friday","answer":"C","target_time_sec":28,"reading_point":"every Saturday が曜日の根拠","evidence_text":"every Saturday","reward_point":10},
{"id":24,"type":"reading","eiken_grade":"5","sub_level":6,"passage":"Mary has two dogs. Their names are Kuro and Shiro. Kuro is black and Shiro is white. Mary walks them in the park every morning.","japanese_translation":"メアリーは2匹の犬を飼っています。名前はクロとシロです。クロは黒くシロは白いです。毎朝公園で散歩させています。","question":"How many dogs does Mary have?","choice_a":"One","choice_b":"Two","choice_c":"Three","choice_d":"Four","answer":"B","target_time_sec":30,"reading_point":"two dogs が答えの根拠","evidence_text":"two dogs","reward_point":10},
{"id":25,"type":"reading","eiken_grade":"5","sub_level":7,"passage":"Tom likes cooking. On weekends, he makes dinner for his family. Last Sunday, he made spaghetti. His mother said it was very good.","japanese_translation":"トムは料理が好きです。週末は家族に夕食を作ります。先週の日曜日、スパゲッティを作りました。お母さんはとてもおいしいと言いました。","question":"What did Tom make last Sunday?","choice_a":"Pizza","choice_b":"Curry","choice_c":"Salad","choice_d":"Spaghetti","answer":"D","target_time_sec":32,"reading_point":"he made spaghetti が料理の根拠","evidence_text":"he made spaghetti","reward_point":10},
{"id":26,"type":"reading","eiken_grade":"5","sub_level":8,"passage":"Yuki goes to school by bus. The bus takes about twenty minutes. She reads books on the bus. Her favorite books are about animals.","japanese_translation":"ユキはバスで学校に行きます。バスで約20分かかります。バスの中で本を読みます。好きな本は動物についての本です。","question":"How long does the bus ride take?","choice_a":"Ten minutes","choice_b":"Fifteen minutes","choice_c":"Twenty minutes","choice_d":"Thirty minutes","answer":"C","target_time_sec":34,"reading_point":"twenty minutes が時間の根拠","evidence_text":"twenty minutes","reward_point":10},
{"id":27,"type":"reading","eiken_grade":"5","sub_level":9,"passage":"Jenny has a birthday party every year. This year, she invited ten friends. They ate cake and played games. Jenny got many birthday presents.","japanese_translation":"ジェニーは毎年誕生日パーティーを開きます。今年は10人の友達を招待しました。ケーキを食べてゲームをしました。ジェニーはたくさんのプレゼントをもらいました。","question":"How many friends did Jenny invite this year?","choice_a":"Five","choice_b":"Eight","choice_c":"Ten","choice_d":"Twelve","answer":"C","target_time_sec":36,"reading_point":"invited ten friends が人数の根拠","evidence_text":"ten friends","reward_point":10},
{"id":28,"type":"reading","eiken_grade":"5","sub_level":10,"passage":"Bob wants to be a doctor. He studies hard every day. He likes science class at school. His dream is to help sick people.","japanese_translation":"ボブは医者になりたいです。毎日一生懸命勉強します。学校の理科の授業が好きです。夢は病気の人を助けることです。","question":"What is Bob's dream?","choice_a":"To be a teacher","choice_b":"To be a scientist","choice_c":"To help sick people","choice_d":"To study abroad","answer":"C","target_time_sec":38,"reading_point":"His dream is to help sick people が夢の根拠","evidence_text":"help sick people","reward_point":10},
{"id":29,"type":"reading","eiken_grade":"4","sub_level":5,"passage":"Sarah is in the school art club. They meet every Tuesday after school. This month, they are making posters for the school festival. Sarah is drawing a picture of the ocean.","japanese_translation":"サラは学校の美術部に入っています。毎週火曜日の放課後に活動しています。今月は学校祭のポスターを作っています。サラは海の絵を描いています。","question":"What day does the art club meet?","choice_a":"Monday","choice_b":"Tuesday","choice_c":"Wednesday","choice_d":"Thursday","answer":"B","target_time_sec":45,"reading_point":"every Tuesday が活動日の根拠","evidence_text":"every Tuesday","reward_point":10},
{"id":30,"type":"reading","eiken_grade":"4","sub_level":6,"passage":"Mike's grandfather lives in the countryside. Mike visits him every summer vacation. They go fishing in the river near the house. Mike always enjoys his time there.","japanese_translation":"マイクのおじいさんは田舎に住んでいます。マイクは毎夏休みに会いに行きます。家の近くの川で釣りをします。マイクはいつもそこで過ごす時間を楽しみます。","question":"What do Mike and his grandfather do together?","choice_a":"Play tennis","choice_b":"Cook dinner","choice_c":"Go fishing","choice_d":"Walk in the mountains","answer":"C","target_time_sec":48,"reading_point":"They go fishing が一緒にすることの根拠","evidence_text":"go fishing","reward_point":10},
{"id":31,"type":"reading","eiken_grade":"4","sub_level":7,"passage":"Amy wants to learn the piano. She asked her parents for lessons, and they agreed. She started taking lessons last month. She practices for thirty minutes every day.","japanese_translation":"エイミーはピアノを習いたいです。両親にレッスンをお願いしたところ、承諾してもらいました。先月レッスンを始めました。毎日30分練習しています。","question":"How long does Amy practice the piano each day?","choice_a":"Twenty minutes","choice_b":"Thirty minutes","choice_c":"Forty minutes","choice_d":"One hour","answer":"B","target_time_sec":50,"reading_point":"thirty minutes every day が練習時間の根拠","evidence_text":"thirty minutes every day","reward_point":10},
{"id":32,"type":"reading","eiken_grade":"4","sub_level":8,"passage":"Jake moved to a new school last spring. He was nervous at first because he did not know anyone. But his classmates were kind and helped him. Now he has many friends.","japanese_translation":"ジェイクは昨春新しい学校に転校しました。最初は誰も知らなかったので緊張しました。しかしクラスメートたちが親切に助けてくれました。今は友達がたくさんできました。","question":"How did Jake feel when he first moved to the new school?","choice_a":"Happy","choice_b":"Excited","choice_c":"Nervous","choice_d":"Angry","answer":"C","target_time_sec":52,"reading_point":"He was nervous at first が気持ちの根拠","evidence_text":"nervous at first","reward_point":10},
{"id":33,"type":"reading","eiken_grade":"4","sub_level":9,"passage":"Nana loves reading. She goes to the library every weekend. Last week, she read a book about space. She wants to be an astronaut when she grows up.","japanese_translation":"ナナは読書が大好きです。毎週末図書館に行きます。先週は宇宙についての本を読みました。大人になったら宇宙飛行士になりたいです。","question":"What does Nana want to be in the future?","choice_a":"A pilot","choice_b":"A scientist","choice_c":"An astronaut","choice_d":"A teacher","answer":"C","target_time_sec":54,"reading_point":"She wants to be an astronaut が将来の夢の根拠","evidence_text":"wants to be an astronaut","reward_point":10},
{"id":34,"type":"reading","eiken_grade":"4","sub_level":10,"passage":"David and his family visited an animal shelter last Sunday. They saw many cats and dogs looking for homes. His family decided to adopt a small brown dog. They named him Cookie.","japanese_translation":"デイビッドと家族は先週日曜日に動物シェルターを訪れました。里親を探しているたくさんの猫や犬を見ました。家族は小さな茶色の犬を引き取ることに決めました。クッキーと名付けました。","question":"What did David's family decide to do?","choice_a":"Donate money to the shelter","choice_b":"Adopt a cat","choice_c":"Adopt a small brown dog","choice_d":"Volunteer at the shelter","answer":"C","target_time_sec":56,"reading_point":"decided to adopt a small brown dog が決定の根拠","evidence_text":"adopt a small brown dog","reward_point":10},
{"id":35,"type":"reading","eiken_grade":"3","sub_level":4,"passage":"Smartphones have become an essential tool in daily life. People use them for communication, shopping, and entertainment. However, spending too much time on smartphones can affect sleep quality and concentration. Many experts suggest putting them away at least one hour before bedtime.","japanese_translation":"スマートフォンは日常生活に欠かせないツールになっています。人々はコミュニケーション・買い物・娯楽に使っています。しかし使いすぎると睡眠の質や集中力に影響することがあります。多くの専門家は就寝の少なくとも1時間前にはしまうよう提案しています。","question":"What do experts suggest about smartphone use?","choice_a":"Use them for exercise","choice_b":"Avoid them completely","choice_c":"Put them away before bedtime","choice_d":"Use them only for work","answer":"C","target_time_sec":58,"reading_point":"putting them away at least one hour before bedtime が専門家の提案","evidence_text":"putting them away at least one hour before bedtime","reward_point":10},
{"id":36,"type":"reading","eiken_grade":"3","sub_level":5,"passage":"Keeping a diary is a useful habit for students. Writing about your day helps you review what you learned. It also improves your writing skills over time. Some students find that writing helps them feel less stressed.","japanese_translation":"日記をつけることは学生にとって有益な習慣です。1日を振り返ることで学んだことを復習できます。また時間の経過とともに文章力も向上します。書くことでストレスが減ると感じる学生もいます。","question":"According to the passage, what is one benefit of keeping a diary?","choice_a":"It improves memory","choice_b":"It helps review what was learned","choice_c":"It saves time","choice_d":"It helps make friends","answer":"B","target_time_sec":60,"reading_point":"helps you review what you learned が利点の根拠","evidence_text":"helps you review what you learned","reward_point":10},
{"id":37,"type":"reading","eiken_grade":"3","sub_level":6,"passage":"Community gardens are becoming popular in cities. Residents grow vegetables and flowers in shared spaces. These gardens help people connect with their neighbors and provide fresh food. They also make neighborhoods more beautiful.","japanese_translation":"コミュニティガーデンが都市で人気になっています。住民が共有スペースで野菜や花を育てます。こうした庭は人々が近所とつながり新鮮な食べ物を得るのに役立ちます。また近所をより美しくします。","question":"What is one reason community gardens are popular?","choice_a":"They reduce traffic","choice_b":"They help people connect with neighbors","choice_c":"They lower housing costs","choice_d":"They create jobs","answer":"B","target_time_sec":62,"reading_point":"help people connect with their neighbors が人気の理由","evidence_text":"help people connect with their neighbors","reward_point":10},
{"id":38,"type":"reading","eiken_grade":"3","sub_level":7,"passage":"Libraries are changing to meet the needs of modern users. Many now offer computers, printers, and study rooms in addition to books. Some libraries even hold events like workshops and concerts. These changes help more people visit and use their services.","japanese_translation":"図書館は現代の利用者のニーズに合わせて変化しています。本に加えてパソコン・プリンター・学習室を備えるところも多くあります。ワークショップやコンサートなどのイベントを開催する図書館もあります。こうした変化により多くの人が訪れてサービスを利用するようになっています。","question":"What have libraries added to attract more visitors?","choice_a":"Swimming pools","choice_b":"Restaurants","choice_c":"Computers and study rooms","choice_d":"Parking spaces","answer":"C","target_time_sec":65,"reading_point":"computers, printers, and study rooms が追加されたものの根拠","evidence_text":"computers, printers, and study rooms","reward_point":10},
{"id":39,"type":"reading","eiken_grade":"3","sub_level":8,"passage":"Walking is one of the easiest ways to stay healthy. You do not need any special equipment, and you can do it anywhere. Studies show that walking for thirty minutes a day can reduce the risk of heart disease and improve mental health.","japanese_translation":"ウォーキングは健康を維持する最も簡単な方法の一つです。特別な器具は必要なく、どこでもできます。1日30分歩くことで心臓病のリスクを下げ精神的健康を改善できることが研究で示されています。","question":"According to studies, what can walking 30 minutes a day do?","choice_a":"Build strong muscles","choice_b":"Improve eyesight","choice_c":"Reduce the risk of heart disease","choice_d":"Help lose weight quickly","answer":"C","target_time_sec":68,"reading_point":"reduce the risk of heart disease が30分ウォーキングの効果","evidence_text":"reduce the risk of heart disease","reward_point":10},
{"id":40,"type":"reading","eiken_grade":"3","sub_level":9,"passage":"Bees play an important role in our food supply. They carry pollen from flower to flower, helping plants produce fruit and seeds. Without bees, many crops would fail. Scientists are worried because bee populations are declining in many parts of the world.","japanese_translation":"ミツバチは食料供給において重要な役割を果たしています。花から花へ花粉を運び植物が実や種を作るのを助けます。ミツバチがいなければ多くの農作物が育たないでしょう。世界の多くの地域でミツバチの個体数が減少しているため科学者たちは懸念しています。","question":"Why are scientists concerned about bees?","choice_a":"They are becoming too aggressive","choice_b":"Their populations are declining","choice_c":"They cause damage to crops","choice_d":"They are spreading disease","answer":"B","target_time_sec":70,"reading_point":"bee populations are declining が懸念の根拠","evidence_text":"bee populations are declining","reward_point":10},
{"id":41,"type":"reading","eiken_grade":"3","sub_level":10,"passage":"Public transportation is important for reducing traffic in cities. When more people use buses and trains, fewer cars are on the roads. This helps reduce air pollution and saves time for commuters. Some cities offer free or discounted public transport to encourage its use.","japanese_translation":"公共交通機関は都市の渋滞を減らすために重要です。より多くの人がバスや電車を使えば道路の車が減ります。これにより大気汚染が減り通勤者の時間節約にもなります。都市によっては利用を促進するため無料または割引の公共交通を提供しています。","question":"Why do some cities offer discounted public transport?","choice_a":"To increase tourism","choice_b":"To encourage its use","choice_c":"To reduce crime","choice_d":"To help the elderly","answer":"B","target_time_sec":72,"reading_point":"encourage its use が割引提供の理由","evidence_text":"encourage its use","reward_point":10},
{"id":42,"type":"reading","eiken_grade":"pre2","sub_level":4,"passage":"Online learning has grown rapidly in recent years. Students can now access courses from top universities around the world without leaving home. While this offers great flexibility, some learners struggle with the lack of direct interaction with teachers and classmates.","japanese_translation":"オンライン学習は近年急速に成長しています。学生は今や自宅を離れることなく世界トップの大学のコースを受講できます。これは大きな柔軟性をもたらす一方、教師やクラスメートとの直接のやり取りがないことに苦労する学習者もいます。","question":"What is one challenge of online learning?","choice_a":"It is too expensive","choice_b":"The courses are too difficult","choice_c":"Lack of direct interaction","choice_d":"Too many students","answer":"C","target_time_sec":75,"reading_point":"struggle with the lack of direct interaction が課題の根拠","evidence_text":"lack of direct interaction with teachers and classmates","reward_point":10},
{"id":43,"type":"reading","eiken_grade":"pre2","sub_level":5,"passage":"Pet therapy involves using trained animals to improve people's health and well-being. Animals such as dogs and cats visit hospitals and care homes to comfort patients. Research has shown that interacting with animals can lower blood pressure and reduce feelings of loneliness.","japanese_translation":"ペットセラピーは訓練された動物を使って人々の健康と幸福を改善することです。犬や猫などの動物が病院や介護施設を訪れ患者を癒します。研究では動物と触れ合うことで血圧が下がり孤独感が和らぐことが示されています。","question":"What have researchers found about interacting with animals?","choice_a":"It increases energy levels","choice_b":"It lowers blood pressure","choice_c":"It improves eyesight","choice_d":"It helps people sleep better","answer":"B","target_time_sec":78,"reading_point":"lower blood pressure が研究の発見の根拠","evidence_text":"lower blood pressure","reward_point":10},
{"id":44,"type":"reading","eiken_grade":"pre2","sub_level":6,"passage":"Music education in schools has many benefits beyond learning to play an instrument. Studies suggest that students who study music tend to perform better in subjects like math and language. Music also teaches teamwork, discipline, and creativity, which are valuable life skills.","japanese_translation":"学校での音楽教育には楽器を習う以上の多くのメリットがあります。音楽を学ぶ学生は数学や語学などの科目でより良い成績を収める傾向があると研究は示しています。また音楽はチームワーク・規律・創造性も教えてくれます。これらは価値ある人生スキルです。","question":"According to studies, what do students who study music tend to do?","choice_a":"Become professional musicians","choice_b":"Skip other subjects","choice_c":"Perform better in math and language","choice_d":"Make more friends","answer":"C","target_time_sec":80,"reading_point":"perform better in subjects like math and language が研究が示す傾向","evidence_text":"perform better in subjects like math and language","reward_point":10},
{"id":45,"type":"reading","eiken_grade":"pre2","sub_level":7,"passage":"Many people today are choosing to reduce the amount of meat they eat. This movement, sometimes called flexitarianism, focuses on eating mostly plant-based foods while occasionally including meat. Supporters say it is better for the environment and personal health, as producing meat requires large amounts of water and land.","japanese_translation":"今日、多くの人が肉の摂取量を減らすことを選択しています。フレキシタリアンと呼ばれることもあるこの運動は、時々肉を食べながら主に植物性食品を食べることを重視します。支持者たちは、肉の生産には大量の水と土地が必要なため、環境と健康に良いと言います。","question":"Why do supporters say flexitarianism is better for the environment?","choice_a":"Plants grow faster than animals","choice_b":"Producing meat requires large amounts of water and land","choice_c":"Vegetarian food is cheaper","choice_d":"Meat causes air pollution directly","answer":"B","target_time_sec":83,"reading_point":"producing meat requires large amounts of water and land が環境への理由","evidence_text":"producing meat requires large amounts of water and land","reward_point":10},
{"id":46,"type":"reading","eiken_grade":"pre2","sub_level":8,"passage":"Drones are increasingly being used in agriculture to help farmers monitor their crops more efficiently. Equipped with cameras and sensors, drones can detect diseases, pests, or lack of water in plants before they become serious problems. This allows farmers to respond quickly and reduce waste.","japanese_translation":"ドローンは農業でも農家が作物をより効率的に管理するために使われるようになっています。カメラとセンサーを搭載したドローンは深刻な問題になる前に植物の病気・害虫・水不足を検出できます。これにより農家は素早く対応し無駄を減らすことができます。","question":"How do drones help farmers?","choice_a":"By harvesting crops automatically","choice_b":"By detecting problems in plants early","choice_c":"By delivering products to customers","choice_d":"By watering crops every day","answer":"B","target_time_sec":86,"reading_point":"detect diseases, pests, or lack of water before they become serious が役立つ理由","evidence_text":"detect diseases, pests, or lack of water in plants before they become serious problems","reward_point":10},
{"id":47,"type":"reading","eiken_grade":"pre2","sub_level":9,"passage":"The concept of a four-day work week is gaining attention in many countries. Trials conducted in Iceland and Japan showed that employees were just as productive while working fewer hours. Companies also reported lower staff turnover and higher job satisfaction among workers.","japanese_translation":"週4日勤務の概念が多くの国で注目を集めています。アイスランドや日本で行われた試験では、従業員は労働時間が少なくても同じくらい生産的であることが示されました。企業も離職率の低下と従業員の仕事満足度の向上を報告しています。","question":"What did trials of a four-day work week show?","choice_a":"Employees worked harder but earned less","choice_b":"Companies lost profits","choice_c":"Employees were just as productive","choice_d":"Workers wanted more days off","answer":"C","target_time_sec":90,"reading_point":"employees were just as productive while working fewer hours が試験の結果","evidence_text":"just as productive while working fewer hours","reward_point":10},
{"id":48,"type":"reading","eiken_grade":"pre2","sub_level":10,"passage":"Digital literacy—the ability to use technology effectively and safely—is becoming as important as reading and writing. Schools around the world are incorporating coding, media literacy, and online safety into their curriculums. Without these skills, young people may struggle to participate fully in modern society.","japanese_translation":"デジタルリテラシー（テクノロジーを効果的かつ安全に使う能力）は読み書きと同様に重要になっています。世界中の学校がカリキュラムにコーディング・メディアリテラシー・オンライン安全を取り入れています。これらのスキルがなければ若者は現代社会に十分に参加することが難しくなるかもしれません。","question":"Why are schools incorporating digital literacy into their curriculums?","choice_a":"To replace traditional subjects","choice_b":"To help students find jobs faster","choice_c":"Because these skills are needed to participate in modern society","choice_d":"To reduce screen time","answer":"C","target_time_sec":95,"reading_point":"struggle to participate fully in modern society が必要な理由","evidence_text":"struggle to participate fully in modern society","reward_point":10},
{"id":49,"type":"reading","eiken_grade":"pre2p","sub_level":4,"passage":"The growing popularity of streaming services has significantly disrupted traditional television broadcasting. Viewers now have the freedom to watch content on demand, without fixed schedules. Advertisers are adapting their strategies to reach audiences on digital platforms, as fewer people watch conventional television.","japanese_translation":"ストリーミングサービスの急増は従来のテレビ放送を大きく混乱させました。視聴者は今や固定スケジュールなしにオンデマンドでコンテンツを視聴できます。従来のテレビを見る人が減っているため、広告主はデジタルプラットフォームでオーディエンスにリーチするよう戦略を適応させています。","question":"How have advertisers responded to changes in viewing habits?","choice_a":"By creating more television shows","choice_b":"By lowering advertising costs","choice_c":"By adapting to digital platforms","choice_d":"By targeting older audiences","answer":"C","target_time_sec":90,"reading_point":"adapting their strategies to reach audiences on digital platforms が対応策","evidence_text":"adapting their strategies to reach audiences on digital platforms","reward_point":10},
{"id":50,"type":"reading","eiken_grade":"pre2p","sub_level":5,"passage":"Carbon capture technology aims to remove carbon dioxide directly from the atmosphere and store it underground. While still expensive and limited in scale, proponents argue it could play a crucial role in addressing climate change. Critics, however, warn that it should not be used as an excuse to delay reducing emissions.","japanese_translation":"炭素回収技術は大気中から直接二酸化炭素を除去し地下に貯蔵することを目指しています。まだコストが高く規模も限られていますが、支持者は気候変動への対処に重要な役割を果たす可能性があると主張します。しかし批評家は、排出削減を遅らせる言い訳に使われるべきではないと警告しています。","question":"What concern do critics raise about carbon capture technology?","choice_a":"It is too dangerous to use","choice_b":"It may be used to delay reducing emissions","choice_c":"It produces toxic waste","choice_d":"It is impossible to scale up","answer":"B","target_time_sec":93,"reading_point":"should not be used as an excuse to delay reducing emissions が批評家の懸念","evidence_text":"excuse to delay reducing emissions","reward_point":10},
{"id":51,"type":"reading","eiken_grade":"pre2p","sub_level":6,"passage":"The rise of e-commerce has transformed the retail industry dramatically. Consumers can compare prices, read reviews, and purchase products from anywhere in the world. Physical stores have struggled to compete, with many closing permanently. Retailers who have survived typically offer unique in-store experiences that cannot be replicated online.","japanese_translation":"eコマースの台頭は小売業界を劇的に変革しました。消費者は世界中のどこからでも価格を比較し口コミを読んで商品を購入できます。実店舗は競争に苦しんでおり、多くが永久閉店しています。生き残った小売業者はオンラインで再現できない独自の店内体験を提供していることが多いです。","question":"How have physical stores survived against e-commerce?","choice_a":"By lowering all prices","choice_b":"By offering unique in-store experiences","choice_c":"By improving their websites","choice_d":"By selling only luxury goods","answer":"B","target_time_sec":95,"reading_point":"offer unique in-store experiences that cannot be replicated online が生き残り策","evidence_text":"unique in-store experiences that cannot be replicated online","reward_point":10},
{"id":52,"type":"reading","eiken_grade":"pre2p","sub_level":7,"passage":"Gamification—the application of game-design elements in non-game contexts—is increasingly used in education and business. By incorporating points, badges, and leaderboards, organizations aim to motivate participation and improve performance. Research suggests that gamification is particularly effective when aligned with users' intrinsic motivations rather than relying solely on external rewards.","japanese_translation":"ゲーミフィケーション（ゲームデザイン要素を非ゲームの文脈に適用すること）は教育やビジネスでますます使われています。ポイント・バッジ・リーダーボードを取り入れることで、組織は参加意欲を高め成果を改善しようとしています。研究によれば、外部報酬だけに頼るのではなくユーザーの内発的動機付けに合わせたときにゲーミフィケーションは特に効果的だとされています。","question":"When is gamification most effective, according to research?","choice_a":"When it offers the highest prizes","choice_b":"When used in competitive sports","choice_c":"When it aligns with users' intrinsic motivations","choice_d":"When applied in technology companies","answer":"C","target_time_sec":98,"reading_point":"particularly effective when aligned with users' intrinsic motivations が最も効果的な条件","evidence_text":"aligned with users' intrinsic motivations","reward_point":10},
{"id":53,"type":"reading","eiken_grade":"pre2p","sub_level":8,"passage":"Light pollution—excessive artificial light at night—poses serious threats to both ecosystems and human health. Many nocturnal animals rely on darkness to hunt and navigate, and bright lights disrupt these behaviors. For humans, exposure to artificial light at night interferes with the production of melatonin, a hormone essential for quality sleep.","japanese_translation":"光害（夜間の過剰な人工光）は生態系と人間の健康の両方に深刻な脅威をもたらします。多くの夜行性動物は狩りや移動のために暗さに頼っており、明るい光はこれらの行動を乱します。人間にとっては、夜間の人工光への曝露が睡眠の質に不可欠なホルモンであるメラトニンの産生を妨げます。","question":"How does light pollution affect humans?","choice_a":"It causes poor eyesight","choice_b":"It interferes with melatonin production","choice_c":"It increases stress levels","choice_d":"It reduces physical activity","answer":"B","target_time_sec":102,"reading_point":"interferes with the production of melatonin が人間への影響","evidence_text":"interferes with the production of melatonin","reward_point":10},
{"id":54,"type":"reading","eiken_grade":"pre2p","sub_level":9,"passage":"Food waste is a global problem with serious environmental consequences. When food decomposes in landfills, it produces methane, a greenhouse gas far more potent than carbon dioxide. At the same time, hundreds of millions of people around the world face food insecurity. Reducing waste through better storage, distribution, and consumer habits is therefore both an environmental and humanitarian imperative.","japanese_translation":"食品廃棄は深刻な環境上の結果をもたらす世界的な問題です。食品が埋立地で分解されるとメタンが発生します。これは二酸化炭素より遥かに強力な温室効果ガスです。同時に世界中で何億人もの人々が食料不安に直面しています。そのため保存・流通・消費者習慣の改善による廃棄削減は環境的かつ人道的な急務です。","question":"Why is food waste particularly harmful to the environment?","choice_a":"It uses too much water","choice_b":"It produces methane when decomposing","choice_c":"It pollutes rivers and oceans","choice_d":"It destroys biodiversity","answer":"B","target_time_sec":107,"reading_point":"produces methane, a greenhouse gas far more potent than carbon dioxide が環境への害","evidence_text":"produces methane, a greenhouse gas far more potent than carbon dioxide","reward_point":10},
{"id":55,"type":"reading","eiken_grade":"pre2p","sub_level":10,"passage":"Algorithmic recommendation systems, used by social media platforms and streaming services, are designed to maximize user engagement by showing content aligned with past behavior. While this personalization improves user experience, it also creates filter bubbles—environments where users are exposed only to viewpoints they already agree with. This phenomenon is considered a contributing factor to increasing social polarization.","japanese_translation":"ソーシャルメディアプラットフォームやストリーミングサービスで使われるアルゴリズム型レコメンデーションシステムは、過去の行動に合ったコンテンツを表示することでユーザーエンゲージメントを最大化するよう設計されています。このパーソナライゼーションはユーザー体験を向上させますが、ユーザーがすでに同意している見解にしか触れないフィルターバブルも生み出します。この現象は社会の二極化の拡大に寄与する要因の一つと考えられています。","question":"What is the negative consequence of filter bubbles?","choice_a":"They slow down internet connections","choice_b":"They expose users to harmful content","choice_c":"They contribute to social polarization","choice_d":"They reduce online privacy","answer":"C","target_time_sec":112,"reading_point":"contributing factor to increasing social polarization がフィルターバブルの悪影響","evidence_text":"contributing factor to increasing social polarization","reward_point":10},
{"id":56,"type":"reading","eiken_grade":"2","sub_level":4,"passage":"The growing field of regenerative medicine seeks to repair or replace damaged tissues and organs using the body's own healing mechanisms. Stem cell therapy, a key component of this field, has shown promise in treating conditions such as Parkinson's disease and spinal cord injuries. Despite early optimism, many treatments remain experimental, as researchers work to overcome challenges related to immune rejection and long-term safety.","japanese_translation":"再生医療という成長分野は身体自身の治癒メカニズムを使って損傷した組織や臓器を修復または置き換えることを目指しています。この分野の重要な要素である幹細胞療法はパーキンソン病や脊髄損傷などの治療に有望性を示しています。初期の楽観論にもかかわらず、研究者たちが免疫拒絶と長期的安全性に関する課題を克服しようとしている中、多くの治療法はまだ実験的です。","question":"What challenge do researchers face in regenerative medicine?","choice_a":"Finding enough volunteers","choice_b":"Immune rejection and long-term safety","choice_c":"Lack of government funding","choice_d":"Shortage of stem cells","answer":"B","target_time_sec":112,"reading_point":"challenges related to immune rejection and long-term safety が研究上の課題","evidence_text":"immune rejection and long-term safety","reward_point":10},
{"id":57,"type":"reading","eiken_grade":"2","sub_level":5,"passage":"The concept of degrowth challenges the conventional assumption that economic growth is necessary for prosperity. Proponents argue that wealthy nations should intentionally reduce production and consumption to live within ecological limits. Critics contend that degrowth would lead to unemployment and reduced public services, making it politically unfeasible in democratic societies.","japanese_translation":"脱成長の概念は経済成長が繁栄に必要であるという従来の前提に異議を唱えます。支持者は豊かな国々が生態系の限界内で生きるために意図的に生産と消費を削減すべきだと主張します。批評家は脱成長が失業と公共サービスの削減をもたらし、民主主義社会では政治的に実行不可能だと反論します。","question":"What do critics argue about degrowth?","choice_a":"It would harm the environment","choice_b":"It would increase inequality","choice_c":"It would be politically unfeasible","choice_d":"It requires too much international cooperation","answer":"C","target_time_sec":115,"reading_point":"politically unfeasible in democratic societies が批評家の主張","evidence_text":"politically unfeasible in democratic societies","reward_point":10},
{"id":58,"type":"reading","eiken_grade":"2","sub_level":6,"passage":"Autonomous vehicles, once considered a distant possibility, are now being tested on public roads in several countries. These self-driving cars use sensors, cameras, and artificial intelligence to navigate without human input. While they promise to reduce traffic accidents caused by human error, questions remain about legal liability when accidents do occur and the cybersecurity risks of connected vehicles.","japanese_translation":"かつては遠い将来の話と考えられていた自律走行車が今や複数の国の公道でテストされています。これらの自動運転車はセンサー・カメラ・人工知能を使って人間の操作なしに走行します。人的ミスによる交通事故の削減が期待される一方、事故が起きた際の法的責任や接続車両のサイバーセキュリティリスクについての疑問は残っています。","question":"What concern is raised about autonomous vehicles?","choice_a":"They are too expensive to produce","choice_b":"They cannot work in bad weather","choice_c":"Legal liability and cybersecurity risks","choice_d":"They require special road infrastructure","answer":"C","target_time_sec":118,"reading_point":"legal liability when accidents do occur and the cybersecurity risks が残された懸念","evidence_text":"legal liability when accidents do occur and the cybersecurity risks","reward_point":10},
{"id":59,"type":"reading","eiken_grade":"2","sub_level":7,"passage":"Biodiversity loss is occurring at an unprecedented rate, driven largely by habitat destruction, pollution, and climate change. Scientists warn that the collapse of ecosystems could trigger cascading effects on food webs, water purification, and disease regulation—services that humans depend on. Conservation efforts have expanded, but experts argue that protecting existing habitats is more effective than attempting to restore damaged ones.","japanese_translation":"生物多様性の喪失は、主に生息地の破壊・汚染・気候変動によって前例のない速度で進んでいます。科学者たちは生態系の崩壊が食物連鎖・水の浄化・疾病制御など人間が依存するサービスに連鎖的な影響をもたらす可能性があると警告しています。保全活動は拡大していますが、既存の生息地を保護する方が損傷した生息地を回復させようとするよりも効果的だと専門家は主張します。","question":"What do experts argue is more effective than restoring damaged habitats?","choice_a":"Creating new national parks","choice_b":"Protecting existing habitats","choice_c":"Reducing pollution levels","choice_d":"Banning all industrial activity","answer":"B","target_time_sec":122,"reading_point":"protecting existing habitats is more effective than attempting to restore damaged ones","evidence_text":"protecting existing habitats is more effective","reward_point":10},
{"id":60,"type":"reading","eiken_grade":"2","sub_level":8,"passage":"The digital divide—the gap between those with access to digital technology and those without—remains a significant global challenge. In developing nations, limited infrastructure and high device costs exclude large portions of the population from the economic and educational benefits of the internet. International organizations are working to bridge this gap, though progress has been uneven across regions.","japanese_translation":"デジタルデバイド（デジタル技術へのアクセスがある人とない人の格差）は依然として重大なグローバルな課題です。発展途上国ではインフラの限界とデバイスの高コストにより大部分の人口がインターネットの経済的・教育的恩恵から排除されています。国際機関はこの格差を埋める取り組みをしていますが、地域間の進捗は不均一です。","question":"Why does the digital divide persist in developing nations?","choice_a":"Lack of interest in technology","choice_b":"Limited infrastructure and high device costs","choice_c":"Government restrictions on the internet","choice_d":"Cultural resistance to change","answer":"B","target_time_sec":125,"reading_point":"limited infrastructure and high device costs exclude large portions が原因","evidence_text":"limited infrastructure and high device costs","reward_point":10},
{"id":61,"type":"reading","eiken_grade":"2","sub_level":9,"passage":"Nanotechnology involves the manipulation of matter at an atomic and molecular scale, typically between 1 and 100 nanometers. Applications span medicine, electronics, and materials science. In medicine, nanoparticles are being explored for targeted drug delivery, potentially allowing treatments to act directly on diseased cells while minimizing side effects on healthy tissue.","japanese_translation":"ナノテクノロジーは通常1〜100ナノメートルの原子・分子レベルでの物質の操作を扱います。医学・電子工学・材料科学など幅広い応用分野があります。医学では、ナノ粒子が標的型薬物送達として研究されており、健康な組織への副作用を最小限にしながら病気の細胞に直接作用する治療を可能にする可能性があります。","question":"How are nanoparticles being used in medicine?","choice_a":"To replace surgical procedures","choice_b":"For targeted drug delivery","choice_c":"To create stronger medicines","choice_d":"To detect viruses in blood","answer":"B","target_time_sec":128,"reading_point":"targeted drug delivery が医学でのナノ粒子の用途","evidence_text":"targeted drug delivery","reward_point":10},
{"id":62,"type":"reading","eiken_grade":"2","sub_level":10,"passage":"The concept of planetary boundaries defines the safe operating space for humanity within Earth's natural systems. Scientists have identified nine such boundaries, including climate change, freshwater use, and biodiversity integrity. Exceeding these limits risks triggering abrupt and irreversible environmental changes that could undermine the stability of the systems that support life on Earth.","japanese_translation":"プラネタリーバウンダリーの概念は地球の自然システムの中で人類にとって安全な活動範囲を定義します。科学者たちは気候変動・淡水使用・生物多様性の完全性など9つのそのような境界を特定しました。これらの限界を超えると地球上の生命を支えるシステムの安定性を損なう可能性のある急激で不可逆的な環境変化を引き起こすリスクがあります。","question":"What do researchers warn about exceeding planetary boundaries?","choice_a":"It will cause immediate disasters","choice_b":"It will lead to economic collapse","choice_c":"It risks triggering irreversible environmental changes","choice_d":"It will increase sea levels only","answer":"C","target_time_sec":132,"reading_point":"risks triggering abrupt and irreversible environmental changes が警告内容","evidence_text":"abrupt and irreversible environmental changes","reward_point":10},
{"id":63,"type":"reading","eiken_grade":"pre1","sub_level":4,"passage":"Epigenetics refers to changes in gene expression that do not involve alterations to the underlying DNA sequence. Environmental factors such as diet, stress, and exposure to toxins can switch genes on or off, influencing an individual's health and development. Crucially, some epigenetic changes can be passed down to future generations, challenging the long-held view that only genetic sequences are inherited.","japanese_translation":"エピジェネティクスとは、基礎となるDNA配列の変化を伴わない遺伝子発現の変化を指します。食事・ストレス・毒素への曝露などの環境要因が遺伝子をオン・オフに切り替え、個人の健康と発達に影響を与えます。重要なことに、一部のエピジェネティックな変化は将来の世代に受け継がれる可能性があり、遺伝子配列のみが受け継がれるという長年の見解に異議を唱えています。","question":"What is significant about some epigenetic changes?","choice_a":"They permanently alter DNA sequences","choice_b":"They can be passed to future generations","choice_c":"They only affect older individuals","choice_d":"They prevent inherited diseases","answer":"B","target_time_sec":140,"reading_point":"epigenetic changes can be passed down to future generations が重要な点","evidence_text":"passed down to future generations","reward_point":10},
{"id":64,"type":"reading","eiken_grade":"pre1","sub_level":5,"passage":"The tragedy of the commons describes a situation where individuals, acting in their own self-interest, deplete a shared resource through collective action, even when it is not in anyone's long-term interest. Originally applied to grazing land, the concept has been extended to explain overfishing, deforestation, and carbon emissions. Proposed solutions range from government regulation to privatization or community-based management systems.","japanese_translation":"「共有地の悲劇」は個人が自らの利益のために行動することで、長期的には誰の利益にもならないにもかかわらず集団行動によって共有資源が枯渇する状況を説明します。もともと放牧地に適用されたこの概念は乱獲・森林破壊・炭素排出を説明するために拡張されています。解決策として政府規制から民営化やコミュニティベースの管理システムまでが提案されています。","question":"According to the passage, what does the tragedy of the commons explain?","choice_a":"Why people cooperate in communities","choice_b":"How governments manage public land","choice_c":"Why shared resources get depleted through self-interest","choice_d":"How individual savings affect national economies","answer":"C","target_time_sec":145,"reading_point":"individuals acting in their own self-interest deplete a shared resource が説明の内容","evidence_text":"individuals, acting in their own self-interest, deplete a shared resource","reward_point":10},
{"id":65,"type":"reading","eiken_grade":"pre1","sub_level":6,"passage":"Quantum computing harnesses the principles of quantum mechanics to process information in fundamentally different ways from classical computers. While conventional computers use binary bits, quantum computers use qubits, which can exist in multiple states simultaneously through a phenomenon called superposition. This allows quantum computers to solve certain complex problems exponentially faster, with potential applications in cryptography, drug discovery, and optimization.","japanese_translation":"量子コンピューティングは量子力学の原理を利用して古典的なコンピューターとは根本的に異なる方法で情報を処理します。従来のコンピューターが二進法のビットを使うのに対し、量子コンピューターは重ね合わせと呼ばれる現象を通じて同時に複数の状態に存在できる量子ビット（qubit）を使います。これにより量子コンピューターは特定の複雑な問題を指数関数的に速く解けるようになり、暗号・創薬・最適化問題への応用が期待されています。","question":"What advantage does superposition give quantum computers?","choice_a":"They use less electricity","choice_b":"They can solve complex problems exponentially faster","choice_c":"They are smaller than classical computers","choice_d":"They do not require cooling systems","answer":"B","target_time_sec":150,"reading_point":"solve certain complex problems exponentially faster が重ね合わせの利点","evidence_text":"solve certain complex problems exponentially faster","reward_point":10},
{"id":66,"type":"reading","eiken_grade":"pre1","sub_level":7,"passage":"The concept of deglobalization has gained traction as nations increasingly prioritize domestic production and reduce reliance on international supply chains. The COVID-19 pandemic exposed vulnerabilities in global supply networks, prompting governments to encourage reshoring—bringing manufacturing back to home countries. Critics argue, however, that deglobalization increases costs and may harm developing economies that depend heavily on export-led growth.","japanese_translation":"脱グローバル化の概念は、各国が国内生産を優先し国際サプライチェーンへの依存を減らすようになるにつれて支持を集めています。COVID-19パンデミックはグローバルなサプライネットワークの脆弱性を露わにし、政府が製造業を本国に戻す「リショアリング」を促進するようになりました。しかし批評家は脱グローバル化はコストを上げ輸出主導の成長に大きく依存する発展途上国を傷つける可能性があると主張します。","question":"What did the COVID-19 pandemic reveal about global supply chains?","choice_a":"They were too dependent on technology","choice_b":"They were more efficient than expected","choice_c":"They had significant vulnerabilities","choice_d":"They benefited developing economies","answer":"C","target_time_sec":155,"reading_point":"exposed vulnerabilities in global supply networks がパンデミックが明らかにしたこと","evidence_text":"vulnerabilities in global supply networks","reward_point":10},
{"id":67,"type":"reading","eiken_grade":"pre1","sub_level":8,"passage":"Neuroplasticity—the brain's ability to reorganize itself by forming new neural connections—challenges the once-dominant view that the adult brain is largely fixed and unchangeable. Research has shown that targeted mental and physical exercises can strengthen neural pathways associated with memory, attention, and emotional regulation. These findings have important implications for rehabilitation after brain injury and for addressing cognitive decline in aging populations.","japanese_translation":"神経可塑性（新しいニューラル接続を形成することで脳が自己を再編成する能力）は成人の脳は大きく固定されて変化しないというかつての支配的な見解に異議を唱えます。研究は標的を絞った精神的・身体的エクササイズが記憶・注意・感情調節に関連するニューラル経路を強化できることを示しています。これらの発見は脳損傷後のリハビリと高齢化人口の認知機能低下への対処に重要な意味を持ちます。","question":"What do the findings about neuroplasticity imply for medicine?","choice_a":"Surgery can fully restore brain function","choice_b":"Brain exercises have no scientific basis","choice_c":"They are important for brain injury rehabilitation","choice_d":"The brain stops changing after age 40","answer":"C","target_time_sec":160,"reading_point":"important implications for rehabilitation after brain injury が医療上の意義","evidence_text":"implications for rehabilitation after brain injury","reward_point":10},
{"id":68,"type":"reading","eiken_grade":"pre1","sub_level":9,"passage":"The notion of posthumanism interrogates traditional boundaries between humans and technology, suggesting that technological augmentation—from cochlear implants to cognitive enhancement—blurs the line between natural and artificial. Transhumanists embrace these developments as opportunities to overcome biological limitations. Critics raise ethical concerns about creating inequality between enhanced and unenhanced individuals and question whether fundamental aspects of humanity would be lost.","japanese_translation":"ポストヒューマニズムの概念は人間とテクノロジーの伝統的な境界を問い直し、人工内耳から認知強化までの技術的拡張が自然と人工の境界線を曖昧にすると主張します。トランスヒューマニストはこれらの発展を生物学的限界を克服する機会として歓迎します。批評家は強化された人間とそうでない人間の間の不平等を生み出すことへの倫理的懸念を提起し、人間性の根本的な側面が失われないかを問います。","question":"What ethical concern do critics raise about technological augmentation?","choice_a":"It may slow scientific progress","choice_b":"It could create inequality between enhanced and unenhanced individuals","choice_c":"It would damage the environment","choice_d":"It reduces human creativity","answer":"B","target_time_sec":165,"reading_point":"inequality between enhanced and unenhanced individuals が批評家の懸念","evidence_text":"inequality between enhanced and unenhanced individuals","reward_point":10},
{"id":69,"type":"reading","eiken_grade":"pre1","sub_level":10,"passage":"The Anthropocene—a proposed geological epoch defined by humanity's dominant impact on Earth's geology and ecosystems—reflects a fundamental shift in how scientists understand our relationship with the planet. The concept carries both descriptive and normative weight: it not only characterizes current conditions but also implies human responsibility for managing planetary systems. Some scholars argue the term risks normalizing environmental destruction by framing it as a natural geological development rather than a crisis requiring urgent intervention.","japanese_translation":"人新世（アンソロポセン）は、地球の地質と生態系への人類の支配的な影響によって定義される地質時代の区分として提案されており、科学者たちが地球との関係をどう理解するかの根本的な転換を反映しています。この概念は記述的かつ規範的な重みを持ちます。現在の状況を特徴づけるだけでなく惑星システムを管理する人間の責任も示唆します。一部の学者は、この用語が環境破壊を緊急の介入が必要な危機ではなく自然な地質学的発展として枠組み化することで環境破壊を正常化するリスクがあると主張します。","question":"What risk do some scholars identify with the term 'Anthropocene'?","choice_a":"It underestimates human intelligence","choice_b":"It may normalize environmental destruction","choice_c":"It focuses too much on geology","choice_d":"It ignores the contributions of non-human species","answer":"B","target_time_sec":170,"reading_point":"risks normalizing environmental destruction が学者の懸念","evidence_text":"normalizing environmental destruction","reward_point":10}];

/* ========================================================
   CONFIG
======================================================== */
const POINT_CONFIG = {
  correct:    10,
  speedBonus:  5,
  combo3:      3,
  combo5:      5,
};

const GRADE_LABEL = {
  '5':    '5級',
  '4':    '4級',
  '3':    '3級',
  'pre2':  '準2級',
  'pre2p': '準2+',
  '2':     '2級',
  'pre1':  '準1級',
  '1':     '1級',
};
const GRADE_ORDER = ['5','4','3','pre2','pre2p','2','pre1','1'];

/* ========================================================
   PRE-PROCESS
======================================================== */
// グレードキーを正規化（pre2+ → pre2p）
PASSAGES.forEach(p => {
  if (p.eiken_grade === 'pre2+') p.eiken_grade = 'pre2p';
});

// 級ごとにグルーピング（sub_level順でソート）
const GRADE_PASSAGES = {};
GRADE_ORDER.forEach(g => {
  GRADE_PASSAGES[g] = PASSAGES
    .filter(p => p.eiken_grade === g)
    .sort((a, b) => (a.sub_level || 0) - (b.sub_level || 0));
});

/* ========================================================
   PROGRESS (localStorage)
======================================================== */
const PROGRESS_KEY = 'sokutore_v1';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{"cleared":{}}'); }
  catch(e) { return { cleared: {} }; }
}
function saveProgress(p) {
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}
function stageKey(grade, idx) { return grade + '_' + idx; }
function isStageCleared(grade, idx) {
  return !!loadProgress().cleared[stageKey(grade, idx)];
}
function isStageSpeedCleared(grade, idx) {
  return loadProgress().cleared[stageKey(grade, idx)] === 'speed';
}
function markStageCleared(grade, idx, isSpeed, earnedPts) {
  const p = loadProgress();
  const k = stageKey(grade, idx);
  if (p.cleared[k] !== 'speed') {
    p.cleared[k] = isSpeed ? 'speed' : true;
  }
  if (!p.pts) p.pts = {};
  if ((p.pts[k] || 0) < (earnedPts || 0)) p.pts[k] = earnedPts || 0;
  saveProgress(p);
}
function isGradeUnlocked(grade) {
  return true; // 全級いつでも開放
}
function isGradeComplete(grade) {
  const pp = GRADE_PASSAGES[grade];
  if (!pp || !pp.length) return false;
  return pp.every((p, i) => isStageCleared(grade, i));
}
function gradeClearedCount(grade) {
  const pp = GRADE_PASSAGES[grade];
  if (!pp) return 0;
  return pp.filter((p, i) => isStageCleared(grade, i)).length;
}

/* ========================================================
   STATE
======================================================== */
let currentGrade     = null;
let currentStageIdx  = null;
let stageAnsweredOK  = false;
let timerSec         = 0;
let timerInterval    = null;
let answered         = false;
let _currentSpeakBtn = null;
let listenMode       = false;
let listenShowChoices = true;

/* ========================================================
   UTILS
======================================================== */
function $(id) { return document.getElementById(id); }

function showScreen(id) {
  stopSpeech();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  $('btnExit').classList.toggle('show', id === 'questionScreen');
  window.scrollTo(0, 0);
}
function formatTime(sec) {
  return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
}
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ========================================================
   GRADE MAP
======================================================== */
function buildGradeMap() {
  const el = $('gradeMapCards');
  el.innerHTML = '';
  GRADE_ORDER.forEach(g => {
    const pp = GRADE_PASSAGES[g];
    if (!pp || !pp.length) return;
    const unlocked   = isGradeUnlocked(g);
    const complete   = isGradeComplete(g);
    const cleared    = gradeClearedCount(g);
    const total      = pp.length;
    const pct        = Math.round((cleared / total) * 100);

    let statusText, cardClass;
    if (!unlocked) {
      statusText = '🔒 ロック中';
      cardClass  = 'grade-card locked';
    } else if (complete) {
      statusText = '✓ クリア済み';
      cardClass  = 'grade-card complete';
    } else if (cleared > 0) {
      statusText = cleared + '/' + total + ' ステージ';
      cardClass  = 'grade-card in-progress';
    } else {
      statusText = total + ' ステージ';
      cardClass  = 'grade-card';
    }

    const gradePts = calcGradePts(g);
    const card = document.createElement('div');
    card.className = cardClass;
    card.innerHTML = `
      <div class="grade-card-name">${GRADE_LABEL[g] || g}</div>
      <div class="grade-card-status">${statusText}</div>
      <div class="grade-card-bar">
        <div class="grade-card-fill" style="width:${pct}%"></div>
      </div>
      <div class="grade-card-pts">${gradePts > 0 ? '⚡ ' + gradePts + 'pt' : ''}</div>`;
    if (unlocked) card.addEventListener('click', () => openStageMap(g));
    el.appendChild(card);
  });
}

/* ========================================================
   STAGE MAP
======================================================== */
function openStageMap(grade) {
  currentGrade = grade;
  buildStageMap();
  showScreen('stageMapScreen');
}

function backToGradeMap() {
  clearInterval(timerInterval);
  buildGradeMap();
  showScreen('gradeMapScreen');
}

function buildStageMap() {
  const grade = currentGrade;
  $('stageMapGradeLabel').textContent = GRADE_LABEL[grade] || grade;

  const pp        = GRADE_PASSAGES[grade];
  const container = $('stagePath');
  container.innerHTML = '';

  pp.forEach((passage, i) => {
    const cleared    = isStageCleared(grade, i);
    const speed      = isStageSpeedCleared(grade, i);
    const prevOK     = i === 0 || isStageCleared(grade, i - 1);
    const isActive   = !cleared && prevOK;
    const isLocked   = !cleared && !prevOK;
    const clickable  = !isLocked;

    let itemClass = 'stage-item';
    if (speed)         itemClass += ' speed-cleared';
    else if (cleared)  itemClass += ' cleared';
    else if (isActive) itemClass += ' active';
    else               itemClass += ' locked';

    let circleContent = (i + 1).toString();
    if (speed)       circleContent = '⭐';
    else if (cleared) circleContent = '✓';
    else if (isLocked) circleContent = '🔒';

    const sp = loadProgress();
    const stagePts = (cleared || speed) && sp.pts ? (sp.pts[stageKey(grade, i)] || 0) : 0;
    const ptsBadge = stagePts > 0 ? ' • ' + stagePts + 'pt' : '';

    let statusText = 'チャレンジ！';
    if (speed)         statusText = 'スピードクリア！' + ptsBadge;
    else if (cleared)  statusText = 'クリア済み' + ptsBadge;
    else if (isLocked) statusText = 'ロック中';

    // Sub-level hint
    const lvHint = passage.sub_level ? '  Lv.' + passage.sub_level : '';

    const item = document.createElement('div');
    item.className  = itemClass;
    if (clickable) item.dataset.clickable = '1';
    item.innerHTML  = `
      <div class="stage-circle">${circleContent}</div>
      <div class="stage-info">
        <div class="stage-info-title">ステージ ${i + 1}${lvHint}</div>
        <div class="stage-info-sub">${statusText}</div>
      </div>`;
    if (clickable) item.addEventListener('click', () => startStage(i));
    container.appendChild(item);
  });
}

/* ========================================================
   START STAGE
======================================================== */
function startStage(idx) {
  currentStageIdx = idx;
  answered        = false;
  stageAnsweredOK = false;
  showScreen('questionScreen');
  renderQuestion();
}

/* ========================================================
   RENDER QUESTION
======================================================== */
function renderQuestion() {
  const q     = GRADE_PASSAGES[currentGrade][currentStageIdx];
  const total = GRADE_PASSAGES[currentGrade].length;
  answered = false;

  // HUD
  $('hudQNum').textContent    = (currentStageIdx + 1) + '/' + total;
  $('hudGrade').textContent   = GRADE_LABEL[currentGrade] || currentGrade;
  $('hudCleared').textContent = gradeClearedCount(currentGrade) + '/' + total;
  $('hudPts').textContent     = getTotalQuizPts().toLocaleString();

  // Timer
  clearInterval(timerInterval);
  timerSec = 0;
  updateTimerDisplay(q.target_time_sec);
  timerInterval = setInterval(() => { timerSec++; updateTimerDisplay(q.target_time_sec); }, 1000);

  // Passage
  $('passageBox').innerHTML = escapeHtml(q.passage);

  // Question
  $('questionText').textContent = q.question;

  // Choices
  const choicesDiv = $('choicesDiv');
  choicesDiv.innerHTML = '';
  [
    { key: 'a', text: q.choice_a },
    { key: 'b', text: q.choice_b },
    { key: 'c', text: q.choice_c },
    { key: 'd', text: q.choice_d },
  ].forEach(({ key, text }) => {
    const btn = document.createElement('button');
    btn.className   = 'choice-btn';
    btn.dataset.key = key;
    btn.innerHTML   = `<span class="choice-label">${key.toUpperCase()}</span>${escapeHtml(text)}`;
    btn.addEventListener('click', () => onAnswer(key));
    choicesDiv.appendChild(btn);
  });

  // Reset UI
  $('feedbackDiv').className = 'feedback';
  $('reviewBtns').style.display    = 'none';
  $('stageActions').style.display  = 'none';
  $('translationBox').classList.remove('show');
  $('evidenceBox').classList.remove('show');
  $('btnTranslation').classList.remove('open');
  $('btnEvidence').classList.remove('open');

  // Listening mode
  const qScreen = $('questionScreen');
  if (listenMode) {
    qScreen.classList.add('listen-mode-active');
    $('choicesDiv').classList.toggle('choices-hidden', !listenShowChoices);
    $('listenStatus').textContent = '🎧 再生ボタンで音声を開始';
    $('listenStatus').className = 'listen-audio-status idle';
    $('btnListenPlay').disabled = false;
    $('btnListenPlay').textContent = '▶ 再生する';
    setTimeout(startListenPlayback, 600);
  } else {
    qScreen.classList.remove('listen-mode-active');
    $('choicesDiv').classList.remove('choices-hidden');
  }
}

/* ========================================================
   TIMER
======================================================== */
function updateTimerDisplay(target) {
  $('timerElapsed').textContent = formatTime(timerSec);
  $('timerTarget').textContent  = '目標: ' + formatTime(target);
  const ratio = Math.min(timerSec / target, 1);
  const bar   = $('timerBar');
  bar.style.width      = (ratio * 100).toFixed(1) + '%';
  bar.style.background = ratio < 0.6 ? '#10B981' : ratio < 0.9 ? '#FBBF24' : '#EF4444';
}

/* ========================================================
   ON ANSWER
======================================================== */
function onAnswer(key) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const q         = GRADE_PASSAGES[currentGrade][currentStageIdx];
  const isCorrect = key === q.answer.toLowerCase();
  const isSpeed   = timerSec <= q.target_time_sec;
  stageAnsweredOK = isCorrect;

  // ポイント計算・進捗を保存
  const earnedPts = isCorrect ? (10 + (isSpeed ? 5 : 0)) : 0;
  if (isCorrect) {
    markStageCleared(currentGrade, currentStageIdx, isSpeed, earnedPts);
    $('hudPts').textContent = getTotalQuizPts().toLocaleString();
    if (fbUser) syncQuizPtsToFirestore();
  }

  // 選択肢を色分け
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.key === q.answer.toLowerCase()) btn.classList.add('correct');
    else if (btn.dataset.key === key && !isCorrect) btn.classList.add('wrong');
  });

  // フィードバック
  const fb = $('feedbackDiv');
  if (isCorrect) {
    fb.className = 'feedback show correct-fb';
    $('feedbackIcon').textContent = '⭕';
    $('feedbackMsg').textContent  = isSpeed
      ? '正解！⚡ スピードクリア！ +' + earnedPts + 'pt'
      : '正解！ +' + earnedPts + 'pt';
  } else {
    fb.className = 'feedback show wrong-fb';
    $('feedbackIcon').textContent = '✖';
    $('feedbackMsg').textContent  = '不正解… 正解は ' + q.answer.toUpperCase() + ' でした';
  }

  if (isCorrect && isSpeed) showSpeedPopup();

  // 復習ボタン
  $('reviewBtns').style.display = 'flex';

  // ステージアクション
  const actions = $('stageActions');
  const btnNext = $('btnStageNext');
  actions.style.display = 'flex';

  if (!isCorrect) {
    btnNext.textContent = '🔄 もう一度';
    btnNext.className   = 'btn-next btn-retry';
  } else {
    const gradeDone = isGradeComplete(currentGrade);
    const nextIdx   = currentStageIdx + 1;
    const hasNext   = nextIdx < GRADE_PASSAGES[currentGrade].length;

    if (gradeDone) {
      btnNext.textContent = '🎉 クリア！';
    } else if (hasNext) {
      btnNext.textContent = '次のステージへ →';
    } else {
      btnNext.textContent = '🗺 マップへ戻る';
    }
    btnNext.className = 'btn-next';
  }

  // HUDのクリア数を更新
  $('hudCleared').textContent =
    gradeClearedCount(currentGrade) + '/' + GRADE_PASSAGES[currentGrade].length;
}

/* ========================================================
   STAGE NEXT
======================================================== */
function stageNext() {
  if (!stageAnsweredOK) {
    // リトライ
    startStage(currentStageIdx);
    return;
  }
  if (isGradeComplete(currentGrade)) {
    showGradeClear();
    return;
  }
  const nextIdx = currentStageIdx + 1;
  if (nextIdx < GRADE_PASSAGES[currentGrade].length) {
    startStage(nextIdx);
  } else {
    goToStageMap();
  }
}

  $('gradeClearStar').textContent  = allSpeed ? '⭐⭐⭐' : '🎉';

  // 次の級ボタン

function getTodayJST() {
  const d   = new Date();
  const jst = new Date(d.getTime() + (d.getTimezoneOffset() + 9 * 60) * 60 * 1000);
  return jst.getFullYear() + '-'
    + String(jst.getMonth() + 1).padStart(2, '0') + '-'
    + String(jst.getDate()).padStart(2, '0');
}

function calcLoginBonus(streak) {
  const table = [50, 70, 100, 120, 140, 160, 200, 220, 240, 300];
  return table[Math.min(streak, 10) - 1];
}

let _loginBonusRunning = false;
async function checkLoginBonus(user) {
  const today        = getTodayJST();
  const localKey     = 'sokutoreLastBonus_'   + user.uid;
  const localStrKey  = 'sokutoreStreak_'      + user.uid;
  const localDateKey = 'sokutoreStreakDate_'   + user.uid;

  if (localStorage.getItem(localKey) === today) return;
  if (_loginBonusRunning) return;
  _loginBonusRunning = true;
  localStorage.setItem(localKey, today);

  try {
    const ref  = fbDb.collection('users').doc(user.uid);
    const doc  = await ref.get();
    const data = doc.data() || {};

    if (data.sokutoreLastLoginDate === today) return;

    const d   = new Date();
    const jst = new Date(d.getTime() + (d.getTimezoneOffset() + 9 * 60) * 60 * 1000);
    jst.setDate(jst.getDate() - 1);
    const prevStr = jst.getFullYear() + '-'
      + String(jst.getMonth() + 1).padStart(2, '0') + '-'
      + String(jst.getDate()).padStart(2, '0');

    let baseStreak = 0;
    if (data.sokutoreLastLoginDate === prevStr) {
      baseStreak = data.sokutoreLoginStreak || 0;
    } else if (localStorage.getItem(localDateKey) === prevStr) {
      baseStreak = parseInt(localStorage.getItem(localStrKey) || '0');
    }
    const streak = baseStreak + 1;
    const bonus  = calcLoginBonus(streak);
    fbStreak = streak;
    updateAuthUI();

    await ref.set({
      displayName:           user.displayName,
      photoURL:              user.photoURL || '',
      sokutoreLastLoginDate: today,
      sokutoreLoginStreak:   streak,
      sokutoreBonusPts:      firebase.firestore.FieldValue.increment(bonus)
    }, { merge: true });

    localStorage.setItem(localStrKey,  String(streak));
    localStorage.setItem(localDateKey, today);

    fbBonusPts += bonus;
    updateAuthUI();
    showLoginBonusModal(bonus, streak);
    submitToSokutoreRanking();
  } catch(e) {
    console.error('LoginBonus:', e);
    localStorage.removeItem(localKey);
  } finally {
    _loginBonusRunning = false;
  }
}

  $('bonusStreakText').textContent = isMax
